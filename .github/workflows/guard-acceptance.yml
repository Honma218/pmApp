# ADR-0001 の機械検証（三層モデルの「事後検証」層）。
# acceptance/ は宣言（CLAUDE.md）・実行時強制（protect-paths hook）・CI の三層すべてで守る。
# 三層すべてで同じルールを張る唯一の対象＝それだけ重要な不変条項。
name: guard-acceptance

on:
  pull_request:
    branches: [main]

jobs:
  path-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ブランチ層で書込権を判定（ADR-0004。hook と同一の条件式）
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          CHANGED="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          echo "$CHANGED"
          case "$HEAD_REF" in
            spec/*)
              # spec/* は acceptance/・docs/spec/ を書ける。実装は書けない（CLAUDE.md §1-4）
              if echo "$CHANGED" | grep -qE '^(backend|frontend)/'; then
                echo "::error::spec/* ブランチから backend/ frontend/ が変更されています。実装が仕様ブランチに紛れ込んでいます（ADR-0004）。"
                exit 1
              fi
              ;;
            *)
              if echo "$CHANGED" | grep -qE '^acceptance/'; then
                echo "::error::acceptance/ が変更されています。受け入れテスト＝仕様＝読み取り専用（ADR-0001）。書けるのは spec/* ブランチのみ（ADR-0004）。"
                echo "::error::仕様変更が必要な場合は PM が仕様表を更新し、AIアーキが /spec でコード翻訳します。"
                exit 1
              fi
              if echo "$CHANGED" | grep -qE '^docs/spec/'; then
                echo "::error::docs/spec/（仕様表の正本）が変更されています。書けるのは spec/* ブランチのみ（ADR-0004）。"
                exit 1
              fi
              ;;
          esac
          # reference-mock/ は全ブランチ read-only（ADR-0005。vendor 更新は統合役が手動）
          if echo "$CHANGED" | grep -qE '^reference-mock/'; then
            echo "::error::reference-mock/（answer key）が変更されています。全ブランチで読み取り専用（ADR-0005）。"
            exit 1
          fi

      - name: シークレット・実データの混入チェック
        run: |
          CHANGED="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          if echo "$CHANGED" | grep -qE '(\.sql$|fixtures/real|^\.env)'; then
            echo "::error::実データ / SQL ダンプ / .env が含まれています。dev は合成フィクスチャのみ（例外なし）。"
            exit 1
          fi
          if git diff origin/${{ github.base_ref }}...HEAD | grep -qE 'sk-[A-Za-z0-9]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----'; then
            echo "::error::シークレットらしき文字列が差分に含まれています。"
            exit 1
          fi
